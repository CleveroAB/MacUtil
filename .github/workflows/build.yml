name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  swift-build:
    name: SwiftPM Build
    # The source references macOS 26 SpeechAnalyzer APIs behind availability
    # checks, so CI must build with an SDK that contains those symbols.
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show toolchain
        run: |
          sw_vers
          swift --version
          xcodebuild -version

      - name: Build package
        run: swift build

      - name: Build app bundle
        run: Scripts/build-app.sh
